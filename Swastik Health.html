async function loadUsers(){
  try{
    const r=await window.storage.get('users',true);
    return r?JSON.parse(r.value):SEED_USERS;
  }catch(e){
    await window.storage.set('users',JSON.stringify(SEED_USERS),true);
    return SEED_USERS;
  }
}
async function saveUsers(list){
  try{ await window.storage.set('users',JSON.stringify(list),true); }catch(e){ console.error('saveUsers failed',e); }
}
async function loadReviews(){
  try{
    const r=await window.storage.get('reviews',true);
    return r?JSON.parse(r.value):REVIEWS;
  }catch(e){
    await window.storage.set('reviews',JSON.stringify(REVIEWS),true);
    return REVIEWS;
  }
}
async function saveReviews(list){
  try{ await window.storage.set('reviews',JSON.stringify(list),true); }catch(e){ console.error('saveReviews failed',e); }
}
async function loadRecords(username){

async function bootstrap(){
  try{
    const [users,reviews]=await Promise.all([loadUsers(),loadReviews()]);
    state.users=users;
    state.reviews=reviews;
  }catch(e){
    console.error('bootstrap failed, falling back to seed data',e);
    state.users=SEED_USERS;
    state.reviews=REVIEWS;
  }
  state.booting=false;
  render();
}

// ── EVENTS ──
function bindEvents(){
  const lb=document.getElementById('loginBtn');
  if(lb){
    lb.onclick=doLogin;
    const pw=document.getElementById('pw');
    if(pw) pw.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    const tog=document.getElementById('tog');
    if(tog) tog.onclick=()=>{state.showPass=!state.showPass;render();};
    const h1=document.getElementById('h1');
    if(h1) h1.onclick=()=>{document.getElementById('un').value='patient1';document.getElementById('pw').value='Health@123';};
    const h2=document.getElementById('h2');
    if(h2) h2.onclick=()=>{document.getElementById('un').value='admin';document.getElementById('pw').value='Admin@2024';};
  }
  const sb=document.getElementById('signupBtn');
  if(sb){
    sb.onclick=doSignup;
    const sp=document.getElementById('suPass');
    if(sp) sp.addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
  }
}

function switchAuth(mode){state.authMode=mode;state.loginErr='';state.signupErr='';render();}
window.switchAuth=switchAuth;

async function doLogin(){
  const u=(document.getElementById('un')||{}).value||'';
  const p=(document.getElementById('pw')||{}).value||'';
  if(!u||!p) return;
  const match=state.users.find(c=>c.user===u&&c.pass===p);
  if(match){
    state.user=match;state.loginErr='';state.attempts=0;state.page='home';
    state.records=[];state.recordsLoading=true;
    render(); // let the user in immediately, don't block on records
    loadRecords(match.user).then(recs=>{
      state.records=recs;state.recordsLoading=false;
      if(state.page==='records') render();
    });
  } else {
    state.attempts++;
    if(state.attempts>=3){state.locked=true;render();return;}
    state.loginErr=`Invalid credentials. Attempt ${state.attempts}/3.`;
    state.loginUser=u;render();
  }
}

async function doSignup(){
  const name=(document.getElementById('suName')||{}).value.trim()||'';
  const user=(document.getElementById('suUser')||{}).value.trim()||'';
  const pass=(document.getElementById('suPass')||{}).value||'';
  const city=(document.getElementById('suCity')||{}).value.trim()||'';
  const blood=(document.getElementById('suBlood')||{}).value||'O+';
  const role=(document.getElementById('suRole')||{}).value||'Patient';
  if(!name||!user||!pass||!city){state.signupErr='Please fill in every field.';render();return;}
  if(pass.length<6){state.signupErr='Password must be at least 6 characters.';render();return;}
  if(state.users.find(c=>c.user===user)){state.signupErr='That username is already taken.';render();return;}
  const newUser={user,pass,name,city,blood,role};
  const updated=[...state.users,newUser];
  state.users=updated;
  state.user=newUser;
  state.signupErr='';state.page='home';
  state.records=[];state.recordsLoading=true;
  render(); // let the user in immediately
  saveUsers(updated);
  loadRecords(user).then(recs=>{
    state.records=recs;state.recordsLoading=false;
    if(state.page==='records') render();
  });
}
window.doSignup=doSignup;

function doLogout(){state.user=null;state.loginErr='';state.loginUser='';state.page='login';state.authMode='login';render();}
window.doLogout=doLogout;

function toggleSOS(){state.sosActive=!state.sosActive;render();}

function bookSlot(doc,slot){state.bookedSlot=slot;state.bookingDoc=doc;render();}

async function submitReview(){
  const hs=document.getElementById('revHosp');
  const tx=document.getElementById('revText');
  if(!hs||!tx||!tx.value.trim()) return;
  state.reviews.unshift({hosp:Number(hs.value),user:state.user.name,rating:5,text:tx.value.trim(),date:"Just now"});
  render();
  await saveReviews(state.reviews);
}

async function addRecord(){
  const names=["Blood Sugar Test","MRI Scan","Vaccination Record","Thyroid Profile","Lipid Panel"];
  const icons=["🔬","🧠","💉","🦋","❤️"];
  const types=["Lab","Radiology","Immunization","Endocrinology","Cardiology"];
  const i=Math.floor(Math.random()*names.length);
  state.records.unshift({name:names[i],date:new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'}),type:types[i],icon:icons[i]});
  render();
  await saveRecords(state.user.user,state.records);
}
window.addRecord=addRecord;

bootstrap();
